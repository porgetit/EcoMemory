<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMemory - Login</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <div class="auth-container">
        <div class="text-center mb-4">
            <div class="eco-logo mb-2"><i class="bi bi-leaf"></i></div>
            <h2 class="mb-1"><span class="brand-eco">Eco</span><span class="brand-memory">Memory</span></h2>
            <p class="text-muted-custom">Capture your moments, preserve the Earth.</p>
        </div>

        <div class="card card-dark w-100 p-4" style="max-width: 420px;">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group custom-input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="emailLogin" placeholder="name@example.com"
                            required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label">Password</label>
                        <a href="#" class="link-accent" style="font-size: 0.85rem;">Forgot?</a>
                    </div>
                    <div class="input-group custom-input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="passLogin" placeholder="••••••••" required>
                        <span class="input-group-text bg-transparent border-start-0" id="togglePass"
                            style="cursor: pointer;">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <button type="submit"
                    class="btn btn-primary-custom w-100 d-flex justify-content-center align-items-center gap-2">
                    Log In <i class="bi bi-arrow-right"></i>
                </button>
                <div id="authAlerts"></div>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted-custom">New to EcoMemory?</span>
                <a href="register.html" class="link-accent">Create account</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
