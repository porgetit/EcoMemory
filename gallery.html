<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMemory - Gallery</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <!-- Navbar Superior -->
    <nav
        class="navbar navbar-expand navbar-dark navbar-custom sticky-top d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-link text-white d-md-none p-0 me-2" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarOffcanvas">
                <i class="bi bi-list fs-4"></i>
            </button>
            <div class="eco-logo-sm"><i class="bi bi-leaf"></i></div>
            <h4 class="mb-0 fs-5"><span class="brand-eco">Eco</span><span class="brand-memory">Memory</span></h4>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted-custom d-none d-sm-inline">Welcome back, <span
                    class="brand-memory user-name-display">User</span></span>
            <button class="btn btn-outline-warning text-white border-warning btn-sm px-3" id="btnLogout"
                style="background-color: var(--accent-primary); border: none;">Logout</button>
            <div class="rounded-circle border border-secondary d-flex justify-content-center align-items-center"
                style="width:35px; height:35px;">
                <i class="bi bi-person text-secondary"></i>
            </div>
        </div>
    </nav>

    <div class="d-flex">
        <!-- Sidebar Izquierdo (Responsive Offcanvas) -->
        <aside class="offcanvas-md offcanvas-start sidebar-wrapper p-4" tabindex="-1" id="sidebarOffcanvas">
            <div class="offcanvas-body d-flex flex-column pt-0 pt-md-2">
                <h5 class="brand-memory fw-bold mb-1">Lifecycle Monitor</h5>
                <p class="text-muted-custom" style="font-size: 0.85rem;">System-wide data erosion metrics</p>

                <div class="stat-card mb-3 d-flex align-items-center gap-3">
                    <div class="stat-icon"><i class="bi bi-trash3"></i></div>
                    <div>
                        <div class="text-muted-custom" style="font-size: 0.8rem;">Deleted by system</div>
                        <div class="stat-value" id="statDeleted">0 items</div>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-3 mb-4 px-2">
                    <div class="stat-icon text-secondary"><i class="bi bi-database"></i></div>
                    <div>
                        <div class="text-muted-custom" style="font-size: 0.8rem;">Bytes freed</div>
                        <div class="stat-value fs-5" id="statFreed">0 GB</div>
                    </div>
                </div>

                <hr class="border-secondary mb-4">

                <ul class="list-unstyled d-flex flex-column gap-3">
                    <li class="d-flex align-items-center gap-2">
                        <i class="bi bi-triangle-fill text-light-decay" style="transform: rotate(90deg);"></i>
                        <div class="w-100">
                            <div class="text-muted-custom" style="font-size: 0.8rem;">Light decay (&lt;25%)</div>
                            <div class="fw-bold fs-6" id="countLight">0 Photos</div>
                        </div>
                    </li>
                    <li class="d-flex align-items-center gap-2">
                        <i class="bi bi-triangle-fill text-minor-decay" style="transform: rotate(90deg);"></i>
                        <div class="w-100">
                            <div class="text-muted-custom" style="font-size: 0.8rem;">Minor decay (25-50%)</div>
                            <div class="fw-bold fs-6" id="countMinor">0 Photos</div>
                        </div>
                    </li>
                    <li class="d-flex align-items-center gap-2">
                        <i class="bi bi-triangle-fill text-major-decay" style="transform: rotate(90deg);"></i>
                        <div class="w-100">
                            <div class="text-muted-custom" style="font-size: 0.8rem;">Major decay (50-75%)</div>
                            <div class="fw-bold fs-6" id="countMajor">0 Photos</div>
                        </div>
                    </li>
                    <li class="d-flex align-items-center gap-2">
                        <i class="bi bi-triangle-fill text-critical-decay" style="transform: rotate(90deg);"></i>
                        <div class="w-100">
                            <div class="text-muted-custom" style="font-size: 0.8rem;">Critical decay (&gt;75%)</div>
                            <div class="fw-bold fs-6" id="countCritical">0 Photos</div>
                        </div>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Área Principal de Galería -->
        <main class="flex-grow-1 p-4">
            <h2 class="fw-bold mb-4">Memory Gallery</h2>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-4" id="galleryGrid">
                <!-- Tarjetas renderizadas vía JS -->
            </div>
        </main>
    </div>

    <!-- Botones Flotantes -->
    <div class="fab-container">
        <button class="btn btn-fab-secondary" id="btnTrash" title="Papelera">
            <i class="bi bi-trash3 fs-5"></i>
        </button>
        <button class="btn btn-fab-primary" id="btnUpload">
            <i class="bi bi-file-earmark-arrow-up fs-5"></i> Upload Photo
        </button>
    </div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/gallery.js"></script>
</body>

</html>
